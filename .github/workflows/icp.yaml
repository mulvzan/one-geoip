name: Convert MRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MRS
        run: |
          mkdir -p rules

          curl -L \
            "https://static-file-global.353355.xyz/rules/cn-additional-list.mrs" \
            -o rules/cn-additional-list.mrs

      - name: Install Mihomo
        run: |
          wget -O mihomo.gz \
            https://github.com/MetaCubeX/mihomo/releases/download/v1.19.25/mihomo-linux-amd64-compatible-v1.19.25.gz

          gunzip mihomo.gz
          chmod +x mihomo

          sudo mv mihomo /usr/local/bin/mihomo

      - name: Convert MRS to YAML
        run: |
          mkdir -p output

          mihomo convert-ruleset domain mrs \
            rules/cn-additional-list.mrs \
            output/cn-additional-list.txt

          # 删除 YAML 中全部 +
          sed -i 's/+//g' output/cn-additional-list.txt

      - name: Generate Custom TXT
        run: |
          OUTPUT="output/CNICP.arrs"

          echo "name = CNICP" > "$OUTPUT"

          sed '/^$/d' output/cn-additional-list.txt \
            | sed 's/^\.//' \
            | sed 's/^/2, /' \
            >> "$OUTPUT"
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/

          git diff --cached --quiet || git commit -m "Auto update rules"

          git push
